# Feature Workflow 配置
# 基于 company-ai-marketplace/templates/config.yaml 生成

# 项目信息
project:
  name: LiteMes
  main_branch: main
  repo_path: .

  tech_stack: java-17-quarkus

  test_framework: junit5

# 并行控制
parallelism:
  max_concurrent: 2

# Git 设置
git:
  remote: origin
  auto_push: false
  merge_strategy: "--no-ff"
  push_tags: true

# 分支策略
branch_prefix: feature
worktree_prefix: LiteMes
worktree_base: ..

# 工作流设置
workflow:
  auto_start: false
  auto_start_next: true
  require_checklist: true
  subagent_timeout: 20

  # 需求切分
  splitting:
    enabled: true
    threshold: 3
    auto_enrich: true

  # 需求审查（开发前质量门）
  review:
    enabled: false
    after_enrich: true
    min_score: 70
    auto_block: false

  # 测试配置
  testing:
    pytest_enabled: false
    junit_enabled: true
    test_dir: src/test
    coverage_enabled: true
    coverage_target: 80

# 归档配置
completion:
  archive:
    create_tag: true
    tag_format: "{id}-{date}"
    tag_date_format: "%Y%m%d"

  cleanup:
    delete_worktree: true
    delete_branch: true

  record:
    update_spec: true
    update_archive_log: true

# 命名规则
naming:
  feature_prefix: feat
  branch_prefix: feature
  worktree_prefix: LiteMes

# 路径配置
paths:
  features_dir: features
  archive_dir: features/archive
  worktree_base: ..
  repo_path: .
